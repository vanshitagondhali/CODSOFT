<!DOCTYPE html>
<html>
<head>
<title>Quiz Maker</title>
<style>
body{
font-family:Arial;
background:#f4f7fc;
text-align:center;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
background:#4a6cf7;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.option{
display:block;
background:#eee;
padding:10px;
margin:10px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Online Quiz Maker</h1>

<h2 id="question">Question</h2>

<div id="options"></div>

<button onclick="nextQuestion()">Next</button>

<h3 id="score"></h3>

</div>

<script>

const quiz = [
{
question:"What does HTML stand for?",
options:[
"Hyper Text Markup Language",
"Home Tool Markup Language",
"Hyperlinks Text Language",
"Hyper Tool Language"
],
answer:"Hyper Text Markup Language"
},

{
question:"Which language is used for styling web pages?",
options:["HTML","CSS","Java","Python"],
answer:"CSS"
},

{
question:"Which language is used for web interactivity?",
options:["JavaScript","HTML","CSS","SQL"],
answer:"JavaScript"
}
];

let current=0;
let score=0;

function loadQuestion(){

document.getElementById("question").innerText=
quiz[current].question;

let optionsHtml="";

quiz[current].options.forEach(option=>{
optionsHtml+=`
<div class="option"
onclick="checkAnswer('${option}')">
${option}
</div>`;
});

document.getElementById("options").innerHTML=
optionsHtml;
}

function checkAnswer(selected){

if(selected===quiz[current].answer){
score++;
}
}

function nextQuestion(){

current++;

if(current<quiz.length){
loadQuestion();
}
else{
document.getElementById("question").innerText=
"Quiz Completed!";
document.getElementById("options").innerHTML="";
document.getElementById("score").innerText=
"Your Score: "+score+"/"+quiz.length;
}
}

loadQuestion();

</script>

</body>
</html>
