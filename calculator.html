<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.calculator{
background:#222;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
width:350px;
}

#display{
width:100%;
height:80px;
border:none;
outline:none;
background:#111;
color:white;
font-size:32px;
text-align:right;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
height:65px;
border:none;
border-radius:12px;
font-size:22px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.number{
background:#333;
color:white;
}

.operator{
background:#ff9500;
color:white;
}

.equal{
background:#28a745;
color:white;
}

.clear{
background:#dc3545;
color:white;
}

.delete{
background:#6c757d;
color:white;
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>
<button class="delete" onclick="deleteLast()">⌫</button>
<button class="operator" onclick="appendValue('%')">%</button>
<button class="operator" onclick="appendValue('/')">÷</button>

<button class="number" onclick="appendValue('7')">7</button>
<button class="number" onclick="appendValue('8')">8</button>
<button class="number" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('*')">×</button>

<button class="number" onclick="appendValue('4')">4</button>
<button class="number" onclick="appendValue('5')">5</button>
<button class="number" onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('-')">−</button>

<button class="number" onclick="appendValue('1')">1</button>
<button class="number" onclick="appendValue('2')">2</button>
<button class="number" onclick="appendValue('3')">3</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button class="number" onclick="appendValue('0')">0</button>
<button class="number" onclick="appendValue('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

let display = document.getElementById("display");

function appendValue(value){
display.value += value;
}

function clearDisplay(){
display.value = "";
}

function deleteLast(){
display.value = display.value.slice(0,-1);
}

function calculate(){
try{
display.value = eval(display.value);
}
catch{
display.value = "Error";
}
}

</script>

</body>
</html>
